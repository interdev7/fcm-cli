name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Build binaries
        run: |
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -ldflags="-X main.version=${VERSION}" -o dist/fcm-linux-amd64 ./cmd/fcm/main.go
          GOOS=linux GOARCH=arm64 go build -ldflags="-X main.version=${VERSION}" -o dist/fcm-linux-arm64 ./cmd/fcm/main.go
          GOOS=darwin GOARCH=amd64 go build -ldflags="-X main.version=${VERSION}" -o dist/fcm-darwin-amd64 ./cmd/fcm/main.go
          GOOS=darwin GOARCH=arm64 go build -ldflags="-X main.version=${VERSION}" -o dist/fcm-darwin-arm64 ./cmd/fcm/main.go
          GOOS=windows GOARCH=amd64 go build -ldflags="-X main.version=${VERSION}" -o dist/fcm-windows-amd64.exe ./cmd/fcm/main.go

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: interdev7/homebrew-fcm
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-fcm

      - name: Calculate Homebrew SHA256
        run: |
          SHA_ARM=$(shasum -a 256 dist/fcm-darwin-arm64 | awk '{print $1}')
          SHA_AMD=$(shasum -a 256 dist/fcm-darwin-amd64 | awk '{print $1}')

          echo "SHA_ARM=$SHA_ARM" >> $GITHUB_ENV
          echo "SHA_AMD=$SHA_AMD" >> $GITHUB_ENV

      - name: Update formula
        run: |
          mkdir -p homebrew-fcm/Formula

          cat > homebrew-fcm/Formula/fcm.rb <<EOF
          class Fcm < Formula
            desc "Production-ready Firebase Cloud Messaging CLI for Go"
            homepage "https://github.com/interdev7/fcm-cli"
            version "${VERSION}"

            if OS.mac?
              if Hardware::CPU.arm?
                url "https://github.com/interdev7/fcm-cli/releases/download/${VERSION}/fcm-darwin-arm64"
                sha256 "${SHA_ARM}"
              else
                url "https://github.com/interdev7/fcm-cli/releases/download/${VERSION}/fcm-darwin-amd64"
                sha256 "${SHA_AMD}"
              end
            end

            def install
              bin.install Dir["fcm-*"].first => "fcm"
            end

            test do
              system "#{bin}/fcm", "-v"
            end
          end
          EOF

      - name: Commit and push formula
        run: |
          cd homebrew-fcm
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Formula/fcm.rb
          git commit -m "Update fcm to ${VERSION}" || echo "No changes to commit"
          git push
